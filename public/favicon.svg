<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo instrument-grade Stitch -->
  <rect width="64" height="64" rx="15" fill="#070708"/>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#2c2d44" stroke-width="2"/>

  <!-- Monograma 'F' geométrico, periwinkle (grueso para legibilidad a 16px) -->
  <g fill="#bec2ff">
    <rect x="19" y="14" width="9" height="36" rx="2"/>            <!-- asta vertical -->
    <rect x="19" y="14" width="27" height="9" rx="2"/>            <!-- brazo superior -->
    <rect x="19" y="29" width="20" height="8" rx="2"/>            <!-- brazo medio (firma F) -->
  </g>

  <!-- Punto de acento (telemetría) -->
  <circle cx="47" cy="46" r="3.2" fill="#50d8e9"/>
</svg>
