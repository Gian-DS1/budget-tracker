<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#0bd3b0" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="g2" x1="400" y1="0" x2="0" y2="400">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="400" height="400" rx="100" fill="#1e293b" />
  
  <!-- Left fold of the arrow -->
  <path d="M120 280 L200 200 L280 280 L320 240 L200 120 L80 240 Z" fill="url(#g1)" filter="url(#shadow)" />
  
  <!-- Right fold of the arrow to create 3D effect -->
  <path d="M200 200 L280 280 L320 240 L200 120 Z" fill="url(#g2)" />
</svg>